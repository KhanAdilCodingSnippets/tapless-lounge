<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join Tapless Lounge to connect in real-time rooms. Simple, fast, and secure." />
    <title>TAPLESS | Login & Register</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-red: #e50914;
            --accent-gold: #fbbf24;
            --deep-dark: #050505;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--deep-dark);
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        h1, h2, h3, .poster-font { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; }

        /* --- SPOTLIGHT BACKGROUND --- */
        .spotlight-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; overflow: hidden;
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%);
        }
        .spotlight {
            position: absolute;
            top: -50%; left: 50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, 
                rgba(229, 9, 20, 0.0) 0deg, 
                rgba(229, 9, 20, 0.1) 20deg, 
                rgba(229, 9, 20, 0.0) 40deg);
            transform-origin: center;
            animation: rotate-light 20s ease-in-out infinite alternate;
        }
        @keyframes rotate-light {
            0% { transform: translateX(-50%) rotate(-20deg); }
            100% { transform: translateX(-50%) rotate(20deg); }
        }

        /* --- 3D FLIP MECHANICS --- */
        .flip-container { perspective: 1000px; }
        .flipper {
            transition: 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%; height: 100%;
        }
        .flipper.is-flipped { transform: rotateY(180deg); }

        /* --- ERROR SHAKE ANIMATION --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-effect { animation: shake 0.4s ease-in-out; }

        /* --- CARD FACES --- */
        .front, .back {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; width: 100%; height: auto;
            background: rgba(15, 15, 15, 0.95);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
        }
        .front { z-index: 2; transform: rotateY(0deg); }
        .back { transform: rotateY(180deg); }

        /* --- INPUTS & BUTTONS --- */
        .auth-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s;
        }
        .auth-input:focus {
            border-color: var(--accent-red);
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.2);
        }
        .btn-primary {
            background-color: var(--accent-red);
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.25rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: #ff0f1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative px-4">

    <div class="spotlight-container">
        <div class="spotlight"></div>
    </div>

    <div class="flip-container w-full max-w-[420px] min-h-[550px]"> 
        <div class="flipper" id="card-flipper">
            
            <div class="front">
                <div class="text-center mb-8">
                    <h1 class="text-5xl text-white tracking-tighter">TAPLESS</h1>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-[0.2em] mt-1">Lounge Access</p>
                </div>

                <div id="error-msg" class="hidden bg-red-600/20 border border-red-600 text-red-200 text-xs p-3 rounded-lg mb-6 text-center font-medium"></div>

                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-widest">Email Address</label>
                        <input type="email" id="login-email" class="auth-input w-full p-3.5 rounded-lg text-sm" placeholder="name@example.com" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-widest">Passcode</label>
                        <input type="password" id="login-password" class="auth-input w-full p-3.5 rounded-lg text-sm" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn-primary w-full py-3 rounded-lg mt-2">
                        LOGIN TO LOUNGE
                    </button>
                </form>
                
                <div class="text-center mt-10 pt-6 border-t border-white/5">
                    <p class="text-xs text-gray-500 font-medium">
                        New here? 
                        <span class="text-white underline cursor-pointer ml-1 hover:text-red-500 transition" onclick="rotateCard()">
                            Create an Account
                        </span>
                    </p>
                </div>
            </div>

            <div class="back">
                <div class="text-center mb-8">
                    <h1 class="text-4xl text-white">JOIN TAPLESS</h1>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-[0.2em] mt-1">Member Registration</p>
                </div>

                <form id="register-form" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-widest">Username</label>
                        <input type="text" id="reg-username" class="auth-input w-full p-3.5 rounded-lg text-sm" placeholder="Preferred Display Name" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-widest">Email Address</label>
                        <input type="email" id="reg-email" class="auth-input w-full p-3.5 rounded-lg text-sm" placeholder="name@example.com" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1.5 uppercase tracking-widest">Create Password</label>
                        <input type="password" id="reg-password" class="auth-input w-full p-3.5 rounded-lg text-sm" placeholder="Min. 8 characters" required>
                    </div>
                    
                    <button type="submit" class="btn-primary w-full py-3 rounded-lg mt-2 bg-white text-black hover:bg-gray-200">
                        REGISTER NOW
                    </button>
                </form>
                
                <div class="text-center mt-10 pt-6 border-t border-white/5">
                    <p class="text-xs text-gray-500 font-medium">
                        Already a member? 
                        <span class="text-white underline cursor-pointer ml-1 hover:text-red-500 transition" onclick="rotateCard()">
                            Login to Account
                        </span>
                    </p>
                </div>
            </div>

        </div>
    </div>

    <script>
        function rotateCard() {
            document.getElementById('card-flipper').classList.toggle('is-flipped');
            document.getElementById('error-msg').classList.add('hidden');
        }
    </script>
    <script src="client-auth.js"></script>
</body>
</html>
